services:
  backend:
    build: ./backend
    container_name: scenote-backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: ./frontend
    container_name: scenote-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://scenote-backend:8000
    depends_on:
      - backend
    restart: always